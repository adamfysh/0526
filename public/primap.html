<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Port Risk Index — Narrows</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0A2540;
    --navy-mid:   #0d304f;
    --blue:       #1565A8;
    --blue-light: #2E86D4;
    --gold:       #F0B429;
    --gold-dark:  #dea020;
    --white:      #FFFFFF;
    --surface:    #F6F8FB;
    --border:     #E4EAF2;
    --text-sec:   #4A6078;
    --text-ter:   #8FA5BB;
    --font: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;

    --c-moderate: #2E86D4;
    --c-elevated: #7FA8C9;
    --c-high:     #E8952A;
    --c-critical: #F0B429;
  }

  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

  html, body { height: 100%; font-family: var(--font); }

  /* ── LAYOUT ── */
  .page { display: flex; flex-direction: column; height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    border-bottom: 2px solid var(--gold);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .brand {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
    text-decoration: none;
  }
  .brand span { color: var(--gold); }
  .header-title {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
    padding-left: 20px;
    border-left: 1px solid rgba(255,255,255,0.15);
  }

  /* ── FILTERS ── */
  .filters { display: flex; align-items: center; gap: 8px; }
  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }
  .filter-btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); color: var(--white); }
  .filter-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .count-badge {
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
  }
  .filter-btn.active .count-badge { color: rgba(255,255,255,0.8); }

  /* ── MAP ── */
  #map { flex: 1; }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: var(--navy);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    padding: 0;
  }
  .leaflet-popup-tip { background: var(--navy); }
  .leaflet-popup-content { margin: 0; width: 240px !important; }
  .popup-inner { padding: 16px 18px; }
  .popup-tier {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .popup-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .popup-country {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
  }
  .popup-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin: 10px 0;
  }
  .popup-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .popup-stat-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 3px;
  }
  .popup-stat-value {
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .popup-stat-unit {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
    font-weight: 300;
  }
  .popup-cta {
    display: block;
    background: var(--gold);
    color: var(--navy);
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 0 0 5px 5px;
    transition: background 0.15s;
  }
  .popup-cta:hover { background: var(--gold-dark); }

  /* ── STATS BAR ── */
  .stats-bar {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 900;
    background: var(--navy);
    border: 1px solid rgba(255,255,255,0.1);
    border-top: 2px solid var(--gold);
    border-radius: 6px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .stats-item {
    padding: 12px 18px;
    border-right: 1px solid rgba(255,255,255,0.08);
    min-width: 90px;
  }
  .stats-item:last-child { border-right: none; }
  .stats-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }
  .stats-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .stats-value.gold { color: var(--gold); }

  /* Leaflet overrides */
  .leaflet-control-zoom {
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 4px !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: var(--navy) !important;
    color: rgba(255,255,255,0.6) !important;
    border: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.1) !important;
    font-size: 16px !important;
    line-height: 28px !important;
    width: 28px !important;
    height: 28px !important;
  }
  .leaflet-control-zoom a:hover { color: var(--white) !important; background: var(--navy-mid) !important; }
  .leaflet-control-attribution { display: none; }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left">
      <a href="/" class="brand">Narrows<span>.</span></a>
      <span class="header-title">Port Risk Index &mdash; 3,804 ports globally</span>
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-tier="all">
        All ports
        <span class="count-badge">3,804</span>
      </button>
      <button class="filter-btn active" data-tier="Moderate">
        <span class="filter-dot" style="background:var(--c-moderate)"></span>
        Moderate
        <span class="count-badge">3,345</span>
      </button>
      <button class="filter-btn active" data-tier="Elevated">
        <span class="filter-dot" style="background:var(--c-elevated)"></span>
        Elevated
        <span class="count-badge">348</span>
      </button>
      <button class="filter-btn active" data-tier="High">
        <span class="filter-dot" style="background:var(--c-high)"></span>
        High
        <span class="count-badge">84</span>
      </button>
      <button class="filter-btn active" data-tier="Critical">
        <span class="filter-dot" style="background:var(--c-critical)"></span>
        Critical
        <span class="count-badge">27</span>
      </button>
    </div>
  </header>

  <div id="map"></div>

  <div class="stats-bar">
    <div class="stats-item">
      <div class="stats-label">Ports indexed</div>
      <div class="stats-value">3,804</div>
    </div>
    <div class="stats-item">
      <div class="stats-label">Critical risk</div>
      <div class="stats-value gold">27</div>
    </div>
    <div class="stats-item">
      <div class="stats-label">Countries</div>
      <div class="stats-value" id="country-count">—</div>
    </div>
    <div class="stats-item">
      <div class="stats-label">Visible</div>
      <div class="stats-value" id="visible-count">3,804</div>
    </div>
  </div>

</div>

<script>
// ── COLOUR MAP ──
const TIER_COLOURS = {
  Moderate: '#2E86D4',
  Elevated: '#7FA8C9',
  High:     '#E8952A',
  Critical: '#F0B429',
};

const TIER_ORDER = ['Moderate','Elevated','High','Critical'];

// ── MAP INIT ──
const map = L.map('map', {
  center: [20, 10],
  zoom: 3,
  zoomControl: true,
  maxZoom: 14,
  minZoom: 2,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Subtle label layer on top
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  attribution: '',
  subdomains: 'abcd',
  maxZoom: 19,
  pane: 'shadowPane',
}).addTo(map);

// ── LOAD DATA ──
let allMarkers = [];
let layerGroups = {};
let activeFilters = new Set(['Moderate','Elevated','High','Critical']);
let countrySet = new Set();

TIER_ORDER.forEach(t => { layerGroups[t] = L.layerGroup().addTo(map); });

function formatDwell(v) {
  if (!v || v === 'null') return '—';
  const h = parseFloat(v);
  if (isNaN(h)) return '—';
  return h >= 24 ? (h/24).toFixed(1) + 'd' : Math.round(h) + 'h';
}

function formatDepth(v) {
  if (!v || v === 'null') return '—';
  const d = parseFloat(v);
  if (isNaN(d)) return '—';
  return d.toFixed(1) + ' m';
}

function buildPopup(p) {
  const colour = TIER_COLOURS[p.t] || '#fff';
  return `
    <div class="popup-inner">
      <div class="popup-tier" style="color:${colour}">${p.t} Risk</div>
      <div class="popup-name">${p.n}</div>
      <div class="popup-country">${p.c}</div>
      <hr class="popup-divider">
      <div class="popup-stats">
        <div>
          <div class="popup-stat-label">PRI Score</div>
          <div class="popup-stat-value" style="color:${colour}">${p.s.toFixed(2)}</div>
          <div class="popup-stat-unit">composite index</div>
        </div>
        <div>
          <div class="popup-stat-label">Dwell Time</div>
          <div class="popup-stat-value">${formatDwell(p.d)}</div>
          <div class="popup-stat-unit">avg cargo wait</div>
        </div>
        <div>
          <div class="popup-stat-label">Controlling Depth</div>
          <div class="popup-stat-value">${formatDepth(p.dp)}</div>
          <div class="popup-stat-unit">channel depth</div>
        </div>
      </div>
    </div>
    <a class="popup-cta" href="/pri">Explore full index →</a>
  `;
}

function getRadius(tier, zoom) {
  const base = { Moderate: 4, Elevated: 5, High: 6, Critical: 7 };
  const r = base[tier] || 4;
  return zoom > 6 ? r + (zoom - 6) * 0.8 : r;
}

fetch('/pri_ports.json')
  .then(r => r.json())
  .then(ports => {
    ports.forEach(p => {
      countrySet.add(p.c);
      const colour = TIER_COLOURS[p.t] || '#888';
      const isCritical = p.t === 'Critical';
      const marker = L.circleMarker([p.la, p.lo], {
        radius: getRadius(p.t, map.getZoom()),
        fillColor: colour,
        fillOpacity: isCritical ? 0.95 : 0.75,
        color: isCritical ? colour : 'transparent',
        weight: isCritical ? 1.5 : 0,
        className: `port-marker tier-${p.t.toLowerCase()}`,
      });
      marker.bindPopup(buildPopup(p), { maxWidth: 240, className: 'narrows-popup' });
      marker._portData = p;
      allMarkers.push(marker);
      layerGroups[p.t].addLayer(marker);
    });

    document.getElementById('country-count').textContent = countrySet.size;
    updateVisibleCount();
  });

// ── ZOOM: resize markers ──
map.on('zoomend', () => {
  const z = map.getZoom();
  allMarkers.forEach(m => {
    m.setRadius(getRadius(m._portData.t, z));
  });
});

// ── FILTERS ──
function updateVisibleCount() {
  let count = 0;
  allMarkers.forEach(m => {
    if (activeFilters.has(m._portData.t)) count++;
  });
  document.getElementById('visible-count').textContent = count.toLocaleString();
}

document.querySelectorAll('.filter-btn[data-tier]').forEach(btn => {
  btn.addEventListener('click', () => {
    const tier = btn.dataset.tier;

    if (tier === 'all') {
      // Toggle all
      const allActive = activeFilters.size === 4;
      if (allActive) {
        activeFilters.clear();
        TIER_ORDER.forEach(t => map.removeLayer(layerGroups[t]));
        document.querySelectorAll('.filter-btn[data-tier]').forEach(b => b.classList.remove('active'));
      } else {
        TIER_ORDER.forEach(t => {
          activeFilters.add(t);
          layerGroups[t].addTo(map);
        });
        document.querySelectorAll('.filter-btn[data-tier]').forEach(b => b.classList.add('active'));
      }
    } else {
      if (activeFilters.has(tier)) {
        activeFilters.delete(tier);
        map.removeLayer(layerGroups[tier]);
        btn.classList.remove('active');
      } else {
        activeFilters.add(tier);
        layerGroups[tier].addTo(map);
        btn.classList.add('active');
      }
      // Update all-button state
      const allBtn = document.querySelector('.filter-btn[data-tier="all"]');
      allBtn.classList.toggle('active', activeFilters.size === 4);
    }

    updateVisibleCount();
  });
});
</script>
</body>
</html>
